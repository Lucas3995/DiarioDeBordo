name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: backend

jobs:
  build-and-test:
    name: Build e Testes (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Verificar estilo (format)
        run: dotnet format --verify-no-changes --no-restore
        continue-on-error: true

      - name: Testes com cobertura
        run: >
          dotnet test
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
        env:
          DOTNET_ENVIRONMENT: Testing
          Jwt__Key: ${{ secrets.JWT_KEY_TESTS || 'chave-de-ci-com-tamanho-minimo-32x!' }}
          Jwt__Issuer: diariodebordo-ci
          Jwt__Audience: diariodebordo-clients-ci

      - name: Publicar cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/TestResults/**/coverage.cobertura.xml
          retention-days: 14

      - name: Enforce minimal coverage (49%)
        run: |
          echo "Checking coverage threshold (49%)..."
          COV_FILE=$(find TestResults -name 'coverage.cobertura.xml' | head -n 1)
          if [ -z "$COV_FILE" ]; then
            echo "Coverage file not found."
            exit 1
          fi
          TOTAL_LINES=$(grep -oP 'lines-valid="\K[0-9]+' "$COV_FILE" | awk '{s+=$1} END {print s}')
          COVERED_LINES=$(grep -oP 'lines-covered="\K[0-9]+' "$COV_FILE" | awk '{s+=$1} END {print s}')
          if [ "$TOTAL_LINES" -eq 0 ]; then
            echo "No lines counted for coverage."
            exit 1
          fi
          PERCENT=$((100 * COVERED_LINES / TOTAL_LINES))
          echo "Coverage: $PERCENT% (threshold: 49%)"
          if [ "$PERCENT" -lt 49 ]; then
            echo "Coverage below threshold."
            exit 1
          fi

      - name: Vulnerability scan
        run: dotnet list --vulnerable --include-transitive
        continue-on-error: true
