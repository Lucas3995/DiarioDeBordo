name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'


jobs:
  build-and-test:
    name: Build e Testes (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          # tests target net10, so ensure SDK 10 is available for build and execution
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Verificar estilo (format)
        run: dotnet format --verify-no-changes --no-restore
        continue-on-error: true

      - name: Testes com cobertura
        run: >
          dotnet test
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
        env:
          DOTNET_ENVIRONMENT: Testing
          Jwt__Key: ${{ secrets.JWT_KEY_TESTS || 'chave-de-ci-com-tamanho-minimo-32x!' }}
          Jwt__Issuer: ${{ vars.JWT_ISSUER_CI || 'project-ci' }}
          Jwt__Audience: ${{ vars.JWT_AUDIENCE_CI || 'project-clients-ci' }}

      - name: Publicar cobertura
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: backend/TestResults/**/coverage.cobertura.xml
          retention-days: 14
