name: CI

on:
  push:
    branches: [ Master, Dev ]
  pull_request:
    branches: [ Master, Dev ]

env:
  DOTNET_VERSION: "10.0.x"
  # CONFIGURE: ajustar para o .sln, projeto de testes e runsettings do seu projeto
  SOLUTION_PATH: backend/YourProject.sln
  TEST_PROJECT: backend/YourProject.Tests/YourProject.Tests.csproj
  RUNSETTINGS_PATH: backend/YourProject.Tests/coverlet.runsettings

jobs:
  detect-targets:
    name: Detect project targets
    runs-on: ubuntu-latest
    outputs:
      has_backend: ${{ steps.detect.outputs.has_backend }}
      has_frontend: ${{ steps.detect.outputs.has_frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect backend/frontend folders
        id: detect
        run: |
          if [ -d backend ]; then
            echo "has_backend=true" >> "$GITHUB_OUTPUT"
            echo "has_backend=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -d frontend ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          env:
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    needs: detect-targets
    if: ${{ needs.detect-targets.outputs.has_backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Format check
        run: dotnet format ${{ env.SOLUTION_PATH }} --verify-no-changes --verbosity normal

  build:
    name: Build
    needs: detect-targets
    if: ${{ needs.detect-targets.outputs.has_backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

  unit-tests:
    name: Unit tests
    needs: [build, detect-targets]
    if: ${{ needs.detect-targets.outputs.has_backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Unit tests with coverage
        run: >
          dotnet test ${{ env.TEST_PROJECT }}
          --configuration Release
          --no-build
          --filter "Category=Unit"
          --collect:"XPlat Code Coverage"
          --results-directory TestResults
          --logger "trx;LogFileName=unit-tests.trx"
          --settings ${{ env.RUNSETTINGS_PATH }}

      - name: Enforce minimal coverage (49%)
        run: |
          echo "Checking coverage threshold (49%)..."
          COV_FILE=$(find TestResults -name 'coverage.cobertura.xml' | head -n 1)
          if [ -z "$COV_FILE" ]; then
            echo "Coverage file not found."
            exit 1
          fi
          TOTAL_LINES=$(grep -oP 'lines-valid="\K[0-9]+' "$COV_FILE" | awk '{s+=$1} END {print s}')
          COVERED_LINES=$(grep -oP 'lines-covered="\K[0-9]+' "$COV_FILE" | awk '{s+=$1} END {print s}')
          if [ "$TOTAL_LINES" -eq 0 ]; then
            echo "No lines counted for coverage."
            exit 1
          fi
          PERCENT=$((100 * COVERED_LINES / TOTAL_LINES))
          echo "Coverage: $PERCENT% (threshold: 49%)"
          if [ "$PERCENT" -lt 49 ]; then
            echo "Coverage below threshold."
            exit 1
          fi

  integration-tests:
    name: Integration tests
    needs: [build, detect-targets]
    if: ${{ needs.detect-targets.outputs.has_backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Integration tests
        run: >
          dotnet test ${{ env.TEST_PROJECT }}
          --configuration Release
          --no-build
          --filter "Category=Integration"
          --logger "trx;LogFileName=integration-tests.trx"

  e2e-tests:
    name: E2E tests
    needs: [build, detect-targets]
    if: ${{ needs.detect-targets.outputs.has_backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: E2E tests
        run: >
          dotnet test ${{ env.TEST_PROJECT }}
          --configuration Release
          --no-build
          --filter "Category=E2E"
          --logger "trx;LogFileName=e2e-tests.trx"

  frontend:
    name: Frontend
    needs: detect-targets
    if: ${{ needs.detect-targets.outputs.has_frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test
        env:
          CI: true

  vulnerability-scan:
    name: Vulnerable packages
    needs: detect-targets
    if: ${{ needs.detect-targets.outputs.has_backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Check for vulnerable packages
        run: |
          echo "Checking for vulnerable packages (direct and transitive)..."
          dotnet list ${{ env.SOLUTION_PATH }} package --vulnerable --include-transitive
