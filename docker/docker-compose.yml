services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Aponta para o PostgreSQL instalado na máquina hospedeira.
      # No Linux com Docker Desktop, use host.docker.internal.
      # Se host.docker.internal não resolver, substitua pelo IP da interface docker (ex.: 172.17.0.1).
      ConnectionStrings__DefaultConnection: "Host=host.docker.internal;Port=5432;Database=diariodebordo;Username=postgres;Password=39953995;SSL Mode=Disable"
      # Chave JWT mínima (32+ chars). Substitua por uma chave forte em outros ambientes.
      Jwt__Key: "diariodebordo-dev-key-min-32-characters-ok"
      Jwt__Issuer: "diariodebordo"
      Jwt__Audience: "diariodebordo-clients"
      # Origens permitidas pelo CORS (frontend rodando localmente)
      Cors__AllowedOrigins__0: "http://localhost:4200"
    extra_hosts:
      # Garante resolução de host.docker.internal em Linux sem Docker Desktop
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend
    # A URL da API e o token JWT são configurados em tela pelo usuário (menu Configurações).
    # Não é necessária variável de ambiente no container para esses valores.
