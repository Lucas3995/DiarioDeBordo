<form class="login-form" [formGroup]="form" (ngSubmit)="submeter()">
  <h3 class="login-form__title">Autenticação</h3>

  <div class="login-form__fields">
    <label class="login-form__label" for="login-input">Login</label>
    <input
      id="login-input"
      class="login-form__input"
      type="text"
      formControlName="login"
      placeholder="Usuário"
      autocomplete="username"
    />

    <label class="login-form__label" for="senha-input">Senha</label>
    <input
      id="senha-input"
      class="login-form__input"
      type="password"
      formControlName="senha"
      placeholder="Senha"
      autocomplete="current-password"
    />
  </div>

  <button
    class="login-form__btn"
    type="submit"
    [disabled]="carregando()"
  >
    {{ carregando() ? 'Autenticando...' : 'Entrar' }}
  </button>

  @if (sucesso()) {
    <p class="login-form__msg login-form__msg--sucesso" role="status">
      Autenticado com sucesso! O token foi salvo automaticamente.
    </p>
  }

  @if (erro()) {
    <p class="login-form__msg login-form__msg--erro" role="alert">
      {{ erro() }}
    </p>
  }
</form>
