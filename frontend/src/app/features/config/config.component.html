<h2>Configurações (Admin)</h2>
<p>A URL da API e o token JWT são armazenados localmente no navegador.</p>

<div class="config-field">
  <label for="apiUrl">URL da API (backend):</label>
  <input
    id="apiUrl"
    type="url"
    [(ngModel)]="apiUrl"
    placeholder="http://localhost:5000"
    (blur)="save()"
  />
</div>

<div class="config-field">
  <label for="jwtToken">Token JWT (Bearer):</label>
  <input
    id="jwtToken"
    type="password"
    [(ngModel)]="jwtToken"
    placeholder="eyJhbGciOi..."
    (blur)="save()"
  />
  <small>Obtido via endpoint de autenticação do backend. Necessário para acessar as rotas protegidas.</small>
</div>

<button type="button" (click)="save()">Salvar</button>
@if (message) {
  <p class="message">{{ message }}</p>
}
