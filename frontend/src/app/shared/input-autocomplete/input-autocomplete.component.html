<div class="input-autocomplete">
  <input
    [id]="inputId"
    type="text"
    class="input-autocomplete-input"
    [value]="value"
    (input)="onInput($any($event.target).value)"
    (focus)="onFocus()"
    (blur)="onBlur()"
    (keydown)="onKeydown($event)"
    [placeholder]="placeholder"
    [attr.aria-label]="ariaLabel"
    [attr.aria-autocomplete]="'list'"
    [attr.aria-expanded]="listVisible"
    [attr.aria-activedescendant]="activeOptionId"
    role="combobox"
    [attr.data-testid]="dataTestid"
  />
  <ul
    class="input-autocomplete-list"
    role="listbox"
    aria-label="Sugestões"
    [class.visually-hidden]="!listVisible || suggestions.length === 0"
    [attr.data-testid]="listDataTestid || 'input-autocomplete-sugestoes'"
  >
    @for (item of suggestions; track getItemId(item)) {
      <li
        [id]="optionId(item)"
        role="option"
        [class.ativa]="isActive(item)"
        (mousedown)="select(item)"
      >
        {{ displayWith(item) }}
      </li>
    }
  </ul>
</div>
